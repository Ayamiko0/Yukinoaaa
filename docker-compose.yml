services:
  yukinoaaa:
    build:
      context: .
      dockerfile: Dockerfile
    image: yukinoaaa:latest
    container_name: yukinoaaa_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://yukinoaaa:secret_password@postgres:5432/yukinoaaa_db}
      - REDIS_URL=${REDIS_URL:-redis://default:secret_redis@redis:6379/0}
      - YUKINOAAA_HOST=${YUKINOAAA_HOST:-0.0.0.0}
      - YUKINOAAA_PORT=${YUKINOAAA_PORT:-8000}
      - DISCORD_ENABLED=${DISCORD_ENABLED:-true}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/api}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yukinoaaa_net

  postgres:
    image: postgres:16-alpine
    container_name: yukinoaaa_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=yukinoaaa
      - POSTGRES_PASSWORD=secret_password
      - POSTGRES_DB=yukinoaaa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yukinoaaa -d yukinoaaa_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yukinoaaa_net

  redis:
    image: redis:7-alpine
    container_name: yukinoaaa_redis
    restart: unless-stopped
    command: redis-server --requirepass secret_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret_redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yukinoaaa_net

networks:
  yukinoaaa_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
